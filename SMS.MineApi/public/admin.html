<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SMS.MineApi Admin</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-card admin-login" id="loginPanel">
        <h1>SMS.MineApi</h1>
        <p>后台登录</p>
        <input id="adminPassword" type="password" placeholder="输入后台密码" autocomplete="current-password">
        <label class="remember-row">
          <input id="rememberPassword" type="checkbox">
          <span>记住密码</span>
        </label>
        <button id="loginButton">登录</button>
        <div class="notice" id="loginNotice"></div>
      </section>

      <section class="admin-dashboard is-hidden" id="cardPanel">
        <header class="admin-top">
          <div>
            <div class="admin-kicker">SMS.MineApi Admin</div>
            <h1 id="adminTitle">SMSMineAPI 物理卡接码系统</h1>
          </div>
          <div class="admin-actions">
            <button class="ghost-button" id="settingsButton">设置</button>
            <button class="ghost-button" id="logoutButton">退出</button>
          </div>
        </header>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="admin-workbench">
          <section class="admin-panel">
            <div class="panel-head">
              <div>
                <h2 id="formTitle">创建卡密</h2>
                <p>编辑已有卡密，或新建单张卡密。</p>
              </div>
              <button class="text-action" id="resetFormButton">清空</button>
            </div>
            <input id="cardKey" placeholder="卡密，留空自动生成">
            <input id="downstreamName" placeholder="下游名称，仅管理员可见">
            <input id="phoneNumber" placeholder="手机号，例如 +10000000001">
            <input id="smsApiUrl" placeholder="短信 API 链接">
            <div class="field-row">
              <input id="durationHours" type="number" min="1" value="600" placeholder="时效小时">
              <select id="status">
                <option value="new">未激活</option>
                <option value="active">已激活</option>
                <option value="archived">已归档</option>
              </select>
            </div>
            <button id="saveCardButton">创建卡密</button>
            <div class="notice" id="cardNotice"></div>
          </section>

          <section class="admin-panel">
            <div class="panel-head">
              <div>
                <h2>批量创建</h2>
                <p>格式：卡密----电话号----API链接----时效小时----下游名称</p>
              </div>
            </div>
            <textarea id="batchText" rows="8" spellcheck="false" placeholder="MINE-001----+10000000003----https://example.test/sms----600----下游A"></textarea>
            <button id="batchCreateButton">批量导入</button>
            <div class="notice" id="batchNotice"></div>
          </section>
        </div>

        <section class="admin-table-panel">
          <div class="panel-head">
            <div>
              <h2>卡密状态</h2>
              <p>状态、剩余时效、查询次数和最近查询时间。</p>
            </div>
            <button class="ghost-button" id="reloadButton">刷新</button>
          </div>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>卡密</th>
                  <th>下游</th>
                  <th>手机号</th>
                  <th>状态</th>
                  <th>时效</th>
                  <th>剩余</th>
                  <th>查询</th>
                  <th>最近查询</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="cardsTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <div class="modal-backdrop is-hidden" id="detailModal">
      <section class="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
        <div class="detail-head">
          <div>
            <div class="admin-kicker">卡密详情</div>
            <h2 id="detailTitle">-</h2>
          </div>
          <button class="icon-button" id="closeDetailButton" aria-label="关闭">×</button>
        </div>
        <div class="detail-grid" id="detailGrid"></div>
        <div class="detail-section">
          <h3>已收到的码</h3>
          <div class="detail-codes" id="detailCodes"></div>
        </div>
      </section>
    </div>

    <div class="modal-backdrop is-hidden" id="settingsModal">
      <section class="detail-modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <div class="detail-head">
          <div>
            <div class="admin-kicker">系统设置</div>
            <h2 id="settingsTitle">页面与安全</h2>
          </div>
          <button class="icon-button" id="closeSettingsButton" aria-label="关闭">×</button>
        </div>
        <div class="settings-grid">
          <label>
            <span>主页左上角 LOGO</span>
            <input id="settingLogoName" placeholder="SMS.MineApi">
          </label>
          <label>
            <span>SIM 卡标题</span>
            <input id="settingSimName" placeholder="MINE SIM">
          </label>
          <label>
            <span>主页左下角版权信息</span>
            <input id="settingFooterCopyright" placeholder="SMS.MineApi.eu.cc | Powered By <b>Open Artivis</b>">
          </label>
          <label>
            <span>主页右侧系统名</span>
            <input id="settingSystemName" placeholder="物理卡接码系统">
          </label>
          <label>
            <span>后台标题</span>
            <input id="settingAdminTitle" placeholder="SMSMineAPI 物理卡接码系统">
          </label>
          <label>
            <span>管理员新密码</span>
            <input id="settingAdminPassword" type="password" placeholder="留空则不修改">
          </label>
        </div>
        <button class="modal-primary" id="saveSettingsButton">保存设置</button>
        <div class="notice" id="settingsNotice"></div>
      </section>
    </div>
    <script src="/admin.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SMS.MineApi</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="logo" id="siteLogo">SMS.MineApi</div>
        <div class="countdown is-hidden" id="countdown"></div>
      </header>

      <main>
        <section class="redeem-card" id="redeemPanel">
          <div class="eyebrow">Access Card</div>
          <h1>兑换验证码卡</h1>
          <input id="cardInput" placeholder="输入卡密" autocomplete="off">
          <button id="redeemButton">兑换</button>
          <div class="notice" id="redeemNotice">兑换成功后开始 25 天有效期。</div>
        </section>

        <section class="receiver is-hidden" id="receiverPanel">
          <div class="sim-card">
            <div class="sim-border"></div>
            <div class="sim-dash"></div>
            <div class="sim-cut"></div>
            <div class="sim-chip"><span></span><span></span><span></span><span></span></div>
            <div class="sim-meta">
              <div id="simNameLabel">MINE SIM</div>
              <span id="cardKeyLabel"></span>
            </div>
            <div class="sim-phone">
              <span>PHONE NUMBER</span>
              <div>
                <strong id="phoneNumber"></strong>
                <button class="icon-button" id="copyPhone" aria-label="复制手机号">⧉</button>
              </div>
            </div>
          </div>

          <div class="code-panel">
            <div class="code-head">
              <div>
                <span>最新验证码</span>
                <small id="refreshHint">自动刷新：每 10 秒</small>
              </div>
              <button class="text-action" id="manualRefresh">刷新</button>
            </div>
            <div class="latest-code">
              <strong id="latestCode">暂无</strong>
              <button id="copyCode">复制</button>
            </div>
            <div class="code-time" id="latestTime">暂未收到验证码</div>
            <div class="divider"></div>
            <div class="history-title">历史验证码</div>
            <div class="history-list" id="historyList"></div>
          </div>
        </section>
      </main>

      <footer>
        <div id="footerCopyright">SMS.MineApi.eu.cc | Powered By <b>Open Artivis</b></div>
        <div id="systemName">物理卡接码系统</div>
      </footer>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
